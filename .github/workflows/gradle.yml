name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build jars
        run: ./gradlew buildClient buildServer

      - name: Rename jars
        run: |
          mv build/dist/rd-client-*.jar build/dist/rd-client.jar
          mv build/dist/rd-server-*.jar build/dist/rd-server.jar

      - name: Get commit hash
        id: hash
        run: echo "sha=$(git rev-parse --short=10 HEAD)" >> $GITHUB_OUTPUT

      - name: Create release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.hash.outputs.sha }}
          name: ${{ steps.hash.outputs.sha }}
          files: |
            build/dist/rd-client.jar
            build/dist/rd-server.jar

  dependency-submission:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Generate and submit dependency graph
        uses: gradle/actions/dependency-submission@af1da67850ed9a4cedd57bfd976089dd991e2582

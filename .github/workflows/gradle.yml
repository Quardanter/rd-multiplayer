name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582

      - name: Build jars
        run: ./gradlew buildClient buildServer

      - name: Rename jars
        run: |
          mv build/dist/rd-client-*.jar build/dist/rd-client.jar
          mv build/dist/rd-server-*.jar build/dist/rd-server.jar

      - name: Get short commit hash
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: vars
        run: echo "sha_short=$(git rev-parse --short=7 HEAD)" >> $GITHUB_OUTPUT

      - name: Delete all old releases including latest
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release list --limit 100 --json tagName -q '.[].tagName' \
            | xargs -I {} gh release delete {} --yes --cleanup-tag || true

      - name: Create fresh latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build (${{ steps.vars.outputs.sha_short }})
          body: |
            Automated build from commit [${{ steps.vars.outputs.sha_short }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
          files: |
            build/dist/rd-client.jar
            build/dist/rd-server.jar
          make_latest: true
